name: Automated Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:api
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-api

      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-api
          path: playwright-report-api/
          retention-days: 30

      - name: Upload API failure evidence
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: test-results-api
          path: test-results/
          retention-days: 30

      - name: Add API report summary
        if: ${{ always() }}
        run: |
          echo "## API test report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Playwright HTML report is published to GitHub Pages after pushes to main/master." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: playwright-report-api" >> $GITHUB_STEP_SUMMARY
          echo "- Failure evidence: test-results-api" >> $GITHUB_STEP_SUMMARY

  e2e-tests:
    name: E2E web tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E web tests
        run: npm run test:web
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-e2e

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-e2e
          path: playwright-report-e2e/
          retention-days: 30

      - name: Upload E2E failure evidence
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: test-results-e2e
          path: test-results/
          retention-days: 30

      - name: Add E2E report summary
        if: ${{ always() }}
        run: |
          echo "## E2E test report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Playwright HTML report is published to GitHub Pages after pushes to main/master." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: playwright-report-e2e" >> $GITHUB_STEP_SUMMARY
          echo "- Failure evidence: test-results-e2e" >> $GITHUB_STEP_SUMMARY

  accessibility-tests:
    name: Accessibility tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npm run test:accessibility
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-accessibility

      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-accessibility
          path: playwright-report-accessibility/
          retention-days: 30

      - name: Upload accessibility failure evidence
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: test-results-accessibility
          path: test-results/
          retention-days: 30

      - name: Add accessibility report summary
        if: ${{ always() }}
        run: |
          echo "## Accessibility test report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The Playwright HTML report is published to GitHub Pages after pushes to main/master." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Artifact: playwright-report-accessibility" >> $GITHUB_STEP_SUMMARY
          echo "- Failure evidence: test-results-accessibility" >> $GITHUB_STEP_SUMMARY

  publish-reports:
    name: Publish reports to GitHub Pages
    runs-on: ubuntu-latest
    needs: [api-tests, e2e-tests, accessibility-tests]
    if: ${{ always() && github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download API report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-api
          path: site/api

      - name: Download E2E report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-e2e
          path: site/e2e

      - name: Download accessibility report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report-accessibility
          path: site/accessibility

      - name: Create reports index
        run: |
          touch site/.nojekyll
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="pt-BR">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Playwright Reports</title>
              <style>
                body {
                  margin: 0;
                  font-family: Arial, sans-serif;
                  color: #172026;
                  background: #f6f8fa;
                }

                main {
                  max-width: 880px;
                  margin: 0 auto;
                  padding: 48px 24px;
                }

                h1 {
                  margin: 0 0 8px;
                  font-size: 32px;
                }

                p {
                  margin: 0 0 32px;
                  color: #52616b;
                }

                nav {
                  display: grid;
                  gap: 16px;
                }

                a {
                  display: block;
                  padding: 20px;
                  border: 1px solid #d8dee4;
                  border-radius: 8px;
                  color: #0969da;
                  background: #ffffff;
                  font-size: 18px;
                  font-weight: 700;
                  text-decoration: none;
                }

                a span {
                  display: block;
                  margin-top: 6px;
                  color: #52616b;
                  font-size: 14px;
                  font-weight: 400;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>Playwright Reports</h1>
                <p>Relatórios publicados automaticamente pelo GitHub Actions.</p>
                <nav aria-label="Relatórios disponíveis">
                  <a href="./api/index.html">API<span>Testes dos endpoints de products e users.</span></a>
                  <a href="./e2e/index.html">E2E Web<span>Fluxos de login e checkout.</span></a>
                  <a href="./accessibility/index.html">Acessibilidade<span>Validação automatizada com axe-core.</span></a>
                </nav>
              </main>
            </body>
          </html>
          HTML

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Add GitHub Pages summary
        run: |
          echo "## Published Playwright reports" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Reports index: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- API: ${{ steps.deployment.outputs.page_url }}api/" >> $GITHUB_STEP_SUMMARY
          echo "- E2E: ${{ steps.deployment.outputs.page_url }}e2e/" >> $GITHUB_STEP_SUMMARY
          echo "- Accessibility: ${{ steps.deployment.outputs.page_url }}accessibility/" >> $GITHUB_STEP_SUMMARY
