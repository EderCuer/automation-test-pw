name: Automated Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  api-tests:
    name: API tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test:api
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-api

      - name: Upload API report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-api
          path: playwright-report-api/
          retention-days: 30

      - name: Upload API failure evidence
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: test-results-api
          path: test-results/
          retention-days: 30

  e2e-tests:
    name: E2E web tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run E2E web tests
        run: npm run test:web
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-e2e

      - name: Upload E2E report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-e2e
          path: playwright-report-e2e/
          retention-days: 30

      - name: Upload E2E failure evidence
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: test-results-e2e
          path: test-results/
          retention-days: 30

  accessibility-tests:
    name: Accessibility tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run accessibility tests
        run: npm run test:accessibility
        env:
          PLAYWRIGHT_HTML_OUTPUT_DIR: playwright-report-accessibility

      - name: Upload accessibility report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-accessibility
          path: playwright-report-accessibility/
          retention-days: 30

      - name: Upload accessibility failure evidence
        uses: actions/upload-artifact@v4
        if: ${{ failure() }}
        with:
          name: test-results-accessibility
          path: test-results/
          retention-days: 30
